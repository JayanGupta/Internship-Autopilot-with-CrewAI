<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CrewAI Workshop — Multi-Agent Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a12;
  --surface:#0d1321;
  --surface2:#111827;
  --border:#1e2d45;
  --border2:#243550;
  --blue:#3b82f6;
  --blue-dim:#1d4ed8;
  --green:#10b981;
  --purple:#8b5cf6;
  --orange:#f59e0b;
  --red:#ef4444;
  --text:#f1f5f9;
  --muted:#64748b;
  --muted2:#94a3b8;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}

/* ── Watermark ── */
.watermark{position:fixed;bottom:16px;left:24px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);opacity:0.4;z-index:100;letter-spacing:.1em;text-transform:uppercase;pointer-events:none}

/* ── Progress bar ── */
#progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--green));transition:width .4s cubic-bezier(.4,0,.2,1);z-index:100}

/* ── Slide container ── */
#slides{width:100%;height:100%;position:relative}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 64px;opacity:0;pointer-events:none;transition:opacity .35s ease}
.slide.active{opacity:1;pointer-events:all}

/* ── Nav ── */
#nav{position:fixed;bottom:32px;right:48px;display:flex;align-items:center;gap:16px;z-index:100}
.nav-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--muted2)}
.nav-btn:hover{background:var(--surface2);border-color:var(--blue);color:var(--text)}
#counter{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em}

/* ── Slide dots ── */
#dots{position:fixed;bottom:38px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:100}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .3s}
.dot.active{background:var(--blue);width:18px;border-radius:3px}

/* ── Typography ── */
.display{font-family:'Outfit',sans-serif;font-weight:800;line-height:1.05;letter-spacing:-.02em}
.mono{font-family:'JetBrains Mono',monospace}
.label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--blue)}

/* ── Backgrounds / glow ── */
.glow-blue{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.07) 0%,transparent 70%);pointer-events:none}
.glow-purple{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.06) 0%,transparent 70%);pointer-events:none}

/* ── Code block ── */
.code-block{background:#050d1a;border:1px solid var(--border);border-radius:12px;overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7}
.code-bar{background:#0d1321;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.code-dots{display:flex;gap:6px}
.code-dots span{width:10px;height:10px;border-radius:50%}
.code-body{padding:20px 24px;overflow-x:auto}
.hl-kw{color:#c678dd}
.hl-fn{color:#61afef}
.hl-str{color:#98c379}
.hl-key{color:#e06c75}
.hl-cmt{color:#5c6370;font-style:italic}
.hl-num{color:#d19a66}
.hl-hi{background:rgba(240,185,11,.12);border-radius:3px;padding:1px 4px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:500;font-family:'JetBrains Mono',monospace}
.tag-blue{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);color:#93c5fd}
.tag-green{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.tag-purple{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);color:#c4b5fd}
.tag-orange{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#fcd34d}
.tag-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flowRight{0%{transform:translateX(-8px);opacity:0}50%{opacity:1}100%{transform:translateX(8px);opacity:0}}
@keyframes scanline{0%{top:0}100%{top:100%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes slideLeft{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.anim-fadeup{animation:fadeUp .5s ease both}
.anim-fadein{animation:fadeIn .4s ease both}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}.d6{animation-delay:.6s}.d7{animation-delay:.7s}.d8{animation-delay:.8s}

/* ── Pipeline flow ── */
.pipe-arrow{display:flex;align-items:center;gap:0;color:var(--muted)}
.pipe-arrow svg{animation:flowRight 1.4s ease-in-out infinite}

/* ── Agent cards for pipeline ── */
.agent-node{display:flex;flex-direction:column;align-items:center;gap:10px;position:relative}

/* ── Comparison bars ── */
.bar-wrap{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}

/* ── Interactive agent builder ── */
.builder-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-family:'JetBrains Mono',monospace;transition:all .2s;color:var(--muted2)}
.builder-btn:hover,.builder-btn.selected{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.08)}

/* ── Temperature slider ── */
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 0 8px rgba(59,130,246,.5)}

</style>
</head>
<body>

<div class="watermark">Jayan Gupta</div>
<div id="progress"></div>
<div id="slides"></div>
<div id="dots"></div>

<div id="nav">
  <div id="counter">01 / 11</div>
  <button class="nav-btn" id="prevBtn">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
  </button>
  <button class="nav-btn" id="nextBtn">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
  </button>
</div>

<script>
// ══════════════════════════════════════════
//  SLIDE DEFINITIONS
// ══════════════════════════════════════════

const slides = [

// ── SLIDE 1: Title ─────────────────────────────────────
{
title: 'title',
html: `
<div class="glow-blue" style="top:-100px;left:-100px"></div>
<div class="glow-purple" style="bottom:-150px;right:-50px"></div>

<div style="text-align:center;max-width:820px;position:relative">
  <div class="anim-fadeup d1" style="margin-bottom:20px">
    <span class="tag tag-blue">AI_WORKSHOP · CREWAI + GEMINI</span>
  </div>

  <h1 class="display anim-fadeup d2" style="font-size:clamp(42px,6vw,72px);margin-bottom:20px;background:linear-gradient(135deg,#fff 0%,#93c5fd 60%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">
    Multi-Agent Systems<br/>with CrewAI
  </h1>

  <p class="anim-fadeup d3" style="font-size:18px;color:var(--muted2);margin-bottom:40px;line-height:1.6;font-weight:300">
    Build an <strong style="color:var(--text)">Internship Autopilot</strong> — a crew of 4 AI agents<br/>that reads your resume and writes cold emails. Autonomously.
  </p>

  <div class="anim-fadeup d4" style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:56px">
    <span class="tag tag-blue">CrewAI Framework</span>
    <span class="tag tag-green">Gemini Flash · Free</span>
    <span class="tag tag-purple">Python · Google Colab</span>
    <span class="tag tag-orange">4 Agents · 4 Tasks</span>
  </div>

  <div class="anim-fadeup d5 card" style="display:inline-flex;align-items:center;gap:0;padding:20px 28px;border-color:var(--border2)">
    <div id="tp-agents" style="display:flex;align-items:center;gap:0"></div>
  </div>

  <p class="anim-fadeup d6" style="margin-top:20px;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace">
    Press <kbd style="background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:4px">→</kbd> to continue
  </p>
</div>
`,
init(el) {
  const agents = [
    {icon:'A',label:'Analyst',color:'#3b82f6'},
    {icon:'R',label:'Researcher',color:'#8b5cf6'},
    {icon:'S',label:'Scorer',color:'#f59e0b'},
    {icon:'W',label:'Writer',color:'#10b981'},
  ];
  const wrap = el.querySelector('#tp-agents');
  wrap.innerHTML = ''; 
  agents.forEach((a,i) => {
    const node = document.createElement('div');
    node.style.cssText = 'display:flex;align-items:center;gap:0';
    node.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;animation:float ${3+i*0.4}s ease-in-out infinite;animation-delay:${i*0.3}s">
        <div style="width:44px;height:44px;border-radius:12px;background:${a.color}18;border:1px solid ${a.color}44;display:flex;align-items:center;justify-content:center;font-size:20px;font-family:'JetBrains Mono',monospace;font-weight:700;color:${a.color}">${a.icon}</div>
        <span style="font-size:9px;font-family:'JetBrains Mono',monospace;color:${a.color};letter-spacing:.05em">${a.label}</span>
      </div>
      ${i<3?`<div style="display:flex;align-items:center;margin:0 4px;margin-bottom:14px">
        <svg width="28" height="10" viewBox="0 0 28 10">
          <path d="M0 5 L20 5" stroke="${a.color}" stroke-width="1.5" stroke-dasharray="3 2" opacity=".5"/>
          <path d="M18 2 L22 5 L18 8" stroke="${a.color}" stroke-width="1.5" fill="none" opacity=".7"/>
        </svg>
      </div>`:''}
    `;
    wrap.appendChild(node);
  });
}
},

// ── SLIDE 2: The Problem ────────────────────────────────
{
title: 'The Problem',
html: `
<div class="glow-blue" style="top:-200px;left:-200px;opacity:.6"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:56px;max-width:1100px;width:100%;align-items:center">

  <div>
    <div class="label anim-fadeup d1" style="margin-bottom:16px">The Problem</div>
    <h2 class="display anim-fadeup d2" style="font-size:clamp(32px,4vw,48px);margin-bottom:24px">Why one LLM call isn't enough</h2>
    <p class="anim-fadeup d3" style="color:var(--muted2);line-height:1.7;margin-bottom:28px;font-size:16px">
      Imagine asking ChatGPT: <em style="color:var(--text)">"Read my resume, research 5 companies, score my fit, and write cold emails."</em>
    </p>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${[
        ['Lack of focus','The model mixes up details from Task A while doing Task B'],
        ['Shallow output','Juggling everything = doing nothing well'],
        ['Context fade','By email-writing time, it has forgotten your resume specifics'],
        ['Generic results','Template-like text with no real personalization'],
      ].map(([t,d],i)=>`
        <div class="card-sm anim-fadeup d${i+4}" style="display:flex;gap:14px;align-items:flex-start;border-color:rgba(239,68,68,.2)">
          <div style="width:20px;height:20px;border-radius:50%;background:rgba(239,68,68,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div>
            <div style="font-weight:500;font-size:14px;margin-bottom:2px">${t}</div>
            <div style="font-size:12px;color:var(--muted)">${d}</div>
          </div>
        </div>
      `).join('')}
    </div>
  </div>

  <div class="anim-fadeup d3">
    <div id="prob-viz" style="display:flex;flex-direction:column;gap:16px"></div>
  </div>
</div>
`,
init(el) {
  const wrap = el.querySelector('#prob-viz');
  wrap.innerHTML = ''; 

  // Single call box
  const single = document.createElement('div');
  single.className = 'card';
  single.style.cssText = 'border-color:rgba(239,68,68,.3);position:relative;overflow:hidden';
  single.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:36px;height:36px;border-radius:10px;background:rgba(239,68,68,.1);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fca5a5;font-family:'JetBrains Mono',monospace">1x</div>
      <div>
        <div style="font-size:12px;font-weight:600;color:#fca5a5">Single LLM Call</div>
        <div style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace">one prompt → everything</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px" id="single-tasks">
      ${['Research','Analysis','Scoring','Email Writing'].map((t,i)=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(239,68,68,.05);border-radius:8px;border:1px solid rgba(239,68,68,.15)">
          <span style="font-size:12px;color:var(--muted2)">${t}</span>
          <div class="bar-wrap" style="width:120px">
            <div class="bar-fill" id="bar-${i}" style="background:linear-gradient(90deg,#ef4444,#dc2626);width:0"></div>
          </div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:12px;font-size:11px;color:#fca5a5;font-family:'JetBrains Mono',monospace;text-align:center">avg quality: 42%</div>
  `;
  wrap.appendChild(single);

  // Crew box
  const crew = document.createElement('div');
  crew.className = 'card';
  crew.style.cssText = 'border-color:rgba(16,185,129,.3)';
  crew.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:36px;height:36px;border-radius:10px;background:rgba(16,185,129,.1);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#6ee7b7;font-family:'JetBrains Mono',monospace">4x</div>
      <div>
        <div style="font-size:12px;font-weight:600;color:#6ee7b7">CrewAI — 4 Specialists</div>
        <div style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace">one agent → one job</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${['Research','Analysis','Scoring','Email Writing'].map((t,i)=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(16,185,129,.05);border-radius:8px;border:1px solid rgba(16,185,129,.15)">
          <span style="font-size:12px;color:var(--muted2)">${t}</span>
          <div class="bar-wrap" style="width:120px">
            <div class="bar-fill" id="bar-c${i}" style="background:linear-gradient(90deg,#10b981,#059669);width:0"></div>
          </div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:12px;font-size:11px;color:#6ee7b7;font-family:'JetBrains Mono',monospace;text-align:center">avg quality: 91%</div>
  `;
  wrap.appendChild(crew);

  // Animate bars
  const singleWidths = [55, 40, 38, 35];
  const crewWidths = [93, 91, 88, 95];
  setTimeout(() => {
    singleWidths.forEach((w, i) => {
      const bar = el.querySelector(`#bar-${i}`);
      if (bar) { bar.style.transition = `width ${0.8 + i * 0.1}s ease ${i * 0.15}s`; bar.style.width = w + '%'; }
    });
    crewWidths.forEach((w, i) => {
      const bar = el.querySelector(`#bar-c${i}`);
      if (bar) { bar.style.transition = `width ${0.8 + i * 0.1}s ease ${i * 0.15 + 0.4}s`; bar.style.width = w + '%'; }
    });
  }, 400);
}
},

// ── SLIDE 3: The Solution — animated pipeline + Terminal ──
{
title: 'The Solution',
html: `
<div class="glow-purple" style="top:-100px;right:-100px;opacity:.7"></div>
<div style="display:grid;grid-template-columns:1fr 1.1fr;gap:48px;width:100%;max-width:1100px;align-items:center">

  <div class="anim-fadeup d2" style="background:#050d1a;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.4)">
    <div style="background:#0d1321;padding:12px 16px;display:flex;gap:6px;border-bottom:1px solid var(--border)">
      <span style="width:10px;height:10px;border-radius:50%;background:#ff5f57"></span>
      <span style="width:10px;height:10px;border-radius:50%;background:#febc2e"></span>
      <span style="width:10px;height:10px;border-radius:50%;background:#28c840"></span>
      <span style="margin-left:auto;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace">crew_execution.log</span>
    </div>
    <div id="term-content" style="padding:20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#a8b2d1;height:380px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;line-height:1.5"></div>
  </div>

  <div>
    <div class="label anim-fadeup d1" style="margin-bottom:16px">The CrewAI Solution</div>
    <h2 class="display anim-fadeup d2" style="font-size:clamp(28px,4vw,42px);margin-bottom:16px">A team of specialists</h2>
    <p class="anim-fadeup d3" style="color:var(--muted2);margin-bottom:32px;font-size:15px;line-height:1.6">
      Each agent executes ONE specific job. CrewAI automatically routes the output of an agent to the next agent as context.
    </p>
    
    <div class="anim-fadeup d3" style="display:flex;align-items:center;gap:0;margin-bottom:32px;flex-wrap:wrap" id="solution-pipeline"></div>
    <div class="anim-fadeup d4 card" id="agent-detail" style="border-color:var(--border2);min-height:160px;transition:all .3s;padding:20px"></div>
    <p style="text-align:center;margin-top:16px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">↑ Click an agent to view their system prompt</p>
  </div>

</div>
`,
init(el) {
  // 1. Terminal Simulation
  const term = el.querySelector('#term-content');
  term.innerHTML = '';
  const lines = [
     {t: "[CREW] Starting sequential execution...", c: "#64748b"},
     {t: "> Agent 1 (Profile Analyst) assigned to Task 1.", c: "#3b82f6"},
     {t: "[Agent 1] Analyzing uploaded resume...", c: "#3b82f6"},
     {t: "[Agent 1] ✓ Extracted: Python, ML, NLP.", c: "#10b981"},
     {t: "> Agent 2 (JD Researcher) assigned to Task 2.", c: "#8b5cf6"},
     {t: "[Agent 2] Searching web for 'Data Scientist' roles...", c: "#8b5cf6"},
     {t: "[Agent 2] ✓ Found 5 matching companies.", c: "#10b981"},
     {t: "> Injecting Task 1 & Task 2 context into Task 3...", c: "#f59e0b"},
     {t: "[Agent 3] Scoring fit based on skills vs requirements...", c: "#f59e0b"},
     {t: "[Agent 3] ✓ Candidate Match Score: 88/100.", c: "#10b981"},
     {t: "> Handing off to Agent 4 (Email Writer)...", c: "#10b981"},
     {t: "[Agent 4] Generating personalized outreach...", c: "#10b981"},
     {t: "[CREW] Pipeline complete. Files saved.", c: "#64748b"}
  ];
  let lIdx = 0;
  function typeLine() {
    if(lIdx >= lines.length) {
      setTimeout(() => { term.innerHTML = ''; lIdx = 0; typeLine(); }, 4000);
      return;
    }
    const div = document.createElement('div');
    div.style.color = lines[lIdx].c;
    div.textContent = lines[lIdx].t;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
    lIdx++;
    setTimeout(typeLine, Math.random() * 600 + 300);
  }
  // Clear any old intervals attached
  if(term.dataset.running) return;
  term.dataset.running = "true";
  typeLine();

  // 2. Interactive Agent Detail
  const agents = [
    {
      icon:'A', label:'Profile Analyst', num:1, color:'#3b82f6',
      role:'Student Profile Analyst',
      goal:'Extract skills, projects, and experience level from the resume.',
      backstory:'A senior tech recruiter with 10 years reading engineering CVs.',
      output:'Structured profile: skills, projects, strengths, gaps'
    },
    {
      icon:'R', label:'JD Researcher', num:2, color:'#8b5cf6',
      role:'Job Market Researcher',
      goal:'Find what entry-level roles each company typically hires for.',
      backstory:'Career intelligence analyst tracking Indian + global tech hiring trends.',
      output:'Per-company: domain, roles, required skills, hiring bar'
    },
    {
      icon:'S', label:'Fit Scorer', num:3, color:'#f59e0b',
      role:'Candidate Fit Evaluator',
      goal:'Score the student\'s match to each company (0–100) and list gaps.',
      backstory:'Objective hiring consultant — honest, actionable gap analysis.',
      output:'Score + strengths + gaps + Apply / Skip recommendation'
    },
    {
      icon:'W', label:'Email Writer', num:4, color:'#10b981',
      role:'Cold Email Specialist',
      goal:'Write personalized cold emails for companies scoring ≥ 50.',
      backstory:'Helped 300+ students land internships via cold outreach. No buzzwords.',
      output:'Subject line + personalized email per qualifying company'
    },
  ];

  const pipeline = el.querySelector('#solution-pipeline');
  const detail = el.querySelector('#agent-detail');
  pipeline.innerHTML = ''; 
  
  function renderDetail(a) {
    detail.style.borderColor = a.color + '44';
    detail.innerHTML = `
      <div style="display:flex; gap:16px; align-items:start">
        <div style="width:48px;height:48px;border-radius:12px;background:${a.color}18;border:1px solid ${a.color}44;display:flex;align-items:center;justify-content:center;font-size:20px;font-family:'JetBrains Mono',monospace;font-weight:700;color:${a.color};flex-shrink:0">${a.icon}</div>
        <div style="flex:1">
          <div style="font-size:10px;font-family:'JetBrains Mono',monospace;color:${a.color};letter-spacing:.1em;margin-bottom:4px">AGENT ${a.num}</div>
          <div style="font-weight:600;font-size:15px;margin-bottom:4px">${a.role}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px"><strong style="color:var(--muted2)">Goal:</strong> ${a.goal}</div>
          
          <div style="border-top:1px solid var(--border);padding-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div>
              <div style="font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-bottom:4px">BACKSTORY</div>
              <div style="font-size:11px;color:var(--muted2);line-height:1.4;font-style:italic">"${a.backstory}"</div>
            </div>
            <div style="border-left:1px solid var(--border);padding-left:12px">
              <div style="font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-bottom:4px">OUTPUT →</div>
              <div style="font-size:11px;color:${a.color};line-height:1.4">${a.output}</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  agents.forEach((a, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:0';

    const node = document.createElement('div');
    node.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:8px;border-radius:12px;transition:background .2s';
    node.dataset.idx = i;
    node.innerHTML = `
      <div id="sp-icon-${i}" style="width:44px;height:44px;border-radius:12px;background:${a.color}18;border:1px solid ${a.color}33;display:flex;align-items:center;justify-content:center;font-size:18px;font-family:'JetBrains Mono',monospace;font-weight:700;color:${a.color};transition:all .25s;position:relative">
        ${a.icon}
        <div style="position:absolute;inset:-4px;border-radius:16px;border:2px solid ${a.color};opacity:0;transition:opacity .25s" id="sp-ring-${i}"></div>
      </div>
      <span style="font-size:9px;font-family:'JetBrains Mono',monospace;color:${a.color};letter-spacing:.05em;white-space:nowrap">Agent ${a.num}</span>
    `;
    node.addEventListener('click', () => {
      agents.forEach((_, j) => {
        const ring = el.querySelector(`#sp-ring-${j}`);
        const icon = el.querySelector(`#sp-icon-${j}`);
        if (ring) ring.style.opacity = j === i ? '1' : '0';
        if (icon) icon.style.transform = j === i ? 'scale(1.1)' : 'scale(1)';
      });
      renderDetail(a);
    });
    wrap.appendChild(node);

    if (i < 3) {
      const arrow = document.createElement('div');
      arrow.style.cssText = 'display:flex;align-items:center;margin-bottom:20px;flex-shrink:0';
      arrow.innerHTML = `
        <svg width="28" height="10" viewBox="0 0 28 10" fill="none">
          <path d="M0 5 L18 5" stroke="${a.color}" stroke-width="1.5" stroke-dasharray="3 2" opacity=".5"/>
          <path d="M14 2 L20 5 L14 8" stroke="${a.color}" stroke-width="1.5" fill="none" opacity=".8"/>
        </svg>
      `;
      wrap.appendChild(arrow);
    }
    pipeline.appendChild(wrap);
  });

  const firstRing = el.querySelector('#sp-ring-0');
  const firstIcon = el.querySelector('#sp-icon-0');
  if (firstRing) firstRing.style.opacity = '1';
  if (firstIcon) firstIcon.style.transform = 'scale(1.1)';
  renderDetail(agents[0]);
}
},

// ── SLIDE 4: Agent Anatomy — interactive builder ─────────
{
title: 'Core Concept: Agent',
html: `
<div class="glow-blue" style="bottom:-100px;left:-50px;opacity:.5"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:52px;max-width:1100px;width:100%;align-items:start">

  <div>

    <p class="anim-fadeup d3" style="color:var(--muted2);line-height:1.7;margin-bottom:24px;font-size:15px">
      An agent is an AI with a <strong style="color:var(--text)">specific identity</strong>. Three fields define it. Each changes the quality of output dramatically.
    </p>

    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px">
      <div class="card-sm anim-fadeup d4" style="border-left:3px solid var(--blue)">

      </div>
      <div class="card-sm anim-fadeup d5" style="border-left:3px solid var(--purple)">
        <div style="font-weight:600;font-size:13px;color:var(--purple);margin-bottom:4px">goal</div>

    <div class="card anim-fadeup d7" style="border-color:rgba(245,158,11,.2)">
      <div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--orange);margin-bottom:10px">INTERACTIVE: Change the backstory</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px" id="backstory-btns"></div>
      <div id="backstory-preview" style="font-size:12px;color:var(--muted);line-height:1.6;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);min-height:56px;font-style:italic;transition:all .3s"></div>
    </div>
  </div>

  <div class="anim-fadeup d3">
    <div class="code-block">
      <div class="code-bar">
        <span style="color:var(--muted);font-size:11px">agent_definition.py</span>
        <div class="code-dots">
          <span style="background:#ff5f57"></span>
          <span style="background:#febc2e"></span>
          <span style="background:#28c840"></span>
        </div>
      </div>
      <div class="code-body" style="font-size:12px">
        <div><span class="hl-kw">from</span> <span class="hl-fn">crewai</span> <span class="hl-kw">import</span> Agent, LLM</div>
        <div style="margin-top:12px"><span class="hl-cmt"># Configure Gemini (free tier)</span></div>
        <div><span class="hl-fn">llm</span> = <span class="hl-fn">LLM</span>(</div>
        <div style="padding-left:20px"><span class="hl-fn">model</span>=<span class="hl-str">"gemini/gemini-2.5-flash"</span>,</div>
        <div style="padding-left:20px"><span class="hl-fn">api_key</span>=os.environ[<span class="hl-str">"GEMINI_API_KEY"</span>],</div>
        <div style="padding-left:20px"><span class="hl-fn">temperature</span>=<span class="hl-num">0.3</span>,</div>
        <div>)</div>
        <div style="margin-top:16px"><span class="hl-cmt"># Define the agent</span></div>
        <div><span class="hl-fn">profile_analyst</span> = <span class="hl-fn">Agent</span>(</div>
        <div style="padding-left:20px"><span class="hl-key">role</span>=<span class="hl-str">"Student Profile Analyst"</span>,</div>
        <div style="padding-left:20px"><span class="hl-key">goal</span>=<span class="hl-str">"Extract skills from resume"</span>,</div>
        <div class="code-row-hi" style="padding-left:20px;margin:2px 0"><span class="hl-key">backstory</span>=<span class="hl-str" id="code-backstory">"You are a senior recruiter..."</span>,</div>
        <div style="padding-left:20px"><span class="hl-key">llm</span>=llm,</div>
        <div style="padding-left:20px"><span class="hl-key">verbose</span>=<span class="hl-kw">True</span>,</div>
        <div>)</div>
        <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-family:'JetBrains Mono',monospace">→ OUTPUT QUALITY</div>
          <div id="quality-bar-wrap" class="bar-wrap">
            <div id="quality-bar" class="bar-fill" style="background:linear-gradient(90deg,var(--green),#059669);width:0;transition:width .6s ease"></div>
          </div>
          <div id="quality-label" style="font-size:11px;margin-top:4px;font-family:'JetBrains Mono',monospace;color:var(--muted)"></div>
        </div>
      </div>
    </div>
  </div>
</div>
`,
init(el) {
  const backstories = [
    { label: 'No backstory', text: '(none)', quality: 28, qlabel: '28% — generic, unfocused output', color: 'var(--red)' },
    { label: 'Vague', text: '"You are an assistant that helps with resumes."', quality: 55, qlabel: '55% — surface-level analysis', color: 'var(--orange)' },
    { label: 'Specific ✓', text: '"You are a senior technical recruiter with 10 years of experience. You\'ve reviewed thousands of student resumes and identify real strengths even in poorly written CVs."', quality: 94, qlabel: '94% — expert recruiter-quality output', color: 'var(--green)' },
  ];

  const btns = el.querySelector('#backstory-btns');
  btns.innerHTML = ''; 
  const preview = el.querySelector('#backstory-preview');
  const codeBackstory = el.querySelector('#code-backstory');
  const qualityBar = el.querySelector('#quality-bar');
  const qualityLabel = el.querySelector('#quality-label');

  function select(i) {
    const b = backstories[i];
    btns.querySelectorAll('.builder-btn').forEach((btn, j) => {
      btn.classList.toggle('selected', j === i);
    });
    preview.textContent = b.text;
    codeBackstory.textContent = b.text === '(none)' ? '""  # ← missing!' : `"${b.text.substring(0, 40)}..."`;
    qualityBar.style.background = `linear-gradient(90deg,${b.color},${b.color})`;
    qualityBar.style.width = b.quality + '%';
    qualityLabel.style.color = b.color;
    qualityLabel.textContent = b.qlabel;
  }

  backstories.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'builder-btn';
    btn.textContent = b.label;
    btn.addEventListener('click', () => select(i));
    btns.appendChild(btn);
  });

  setTimeout(() => select(2), 600);
}
},

    { max: 3, label: 'Structured', color: 'tag-blue', desc: 'Best for scoring, analysis, extraction. Output is consistent and predictable. Use this for Profile Analyst and Fit Scorer.' },

  ];

  function update() {
    const v = slider.value / 10;
    valEl.textContent = v.toFixed(1);

    labelEl.className = `tag ${zone.color}`;

// ══════════════════════════════════════════
//  ENGINE
// ══════════════════════════════════════════

let current = 0;
const container = document.getElementById('slides');
const progress = document.getElementById('progress');
const counter = document.getElementById('counter');
const dots = document.getElementById('dots');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

// Build slides and dots
slides.forEach((slide, i) => {
  // Slide div
  const div = document.createElement('div');
  div.className = 'slide';
  div.id = `slide-${i}`;
  div.innerHTML = slide.html;
  container.appendChild(div);

  // Dot
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => goTo(i));
  dots.appendChild(dot);
});

function goTo(n) {
  if (n < 0 || n >= slides.length) return;
  const prev = current;
  current = n;

  document.getElementById(`slide-${prev}`).classList.remove('active');
  const next = document.getElementById(`slide-${current}`);
  next.classList.add('active');

  // Trigger animations by updating content
  if (slides[current].init) {
    slides[current].init(next);
  }

  // Progress bar
  progress.style.width = ((current + 1) / slides.length * 100) + '%';

  // Counter (dynamically checks length)
  counter.textContent = `${String(current + 1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;

  // Dots
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));

  // Buttons
  prevBtn.style.opacity = current === 0 ? '.3' : '1';
  nextBtn.style.opacity = current === slides.length - 1 ? '.3' : '1';
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(current - 1); }
});

goTo(0);
</script>
</body>
</html>
